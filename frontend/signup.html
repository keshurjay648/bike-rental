<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Torque Rentals</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="auth-ui.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
  </head>
  <body>
    <header>
      <div class="nav container">
        <a href="index.html" class="logo">
          <img src="img/logo.png" width="80" height="40" alt="Torque Rentals logo" />
        </a>
        <!-- Sign up button - shown when not logged in -->
        <a href="login.html" class="sign-up" id="signup-btn">Log In</a>
        <!-- User Profile - shown when logged in -->
        <div class="user-profile hidden" id="user-profile">
          <div class="profile-dropdown">
            <button class="profile-btn" id="profile-btn">
              <i class="ri-user-line"></i>
              <span id="user-name">User</span>
              <i class="ri-arrow-down-s-line"></i>
            </button>
            <div class="profile-menu" id="profile-menu">
              <a href="profile.html" class="profile-menu-item">
                <i class="ri-user-line"></i>
                My Profile
              </a>
              <a href="#" class="profile-menu-item" id="logout-btn">
                <i class="ri-logout-box-line"></i>
                Logout
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="auth-page">
      <div class="container auth-wrap">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-logo">
              <i class="ri-user-add-line"></i>
            </div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Sign up to manage your bookings and payments.</p>
          </div>

          <form id="signupForm" class="auth-form">
            <div class="form-group">
              <label for="signupName">
                <i class="ri-user-line"></i>
                Full Name
              </label>
              <input type="text" id="signupName" placeholder="Enter your full name" required />
            </div>

            <div class="form-group">
              <label for="signupEmail">
                <i class="ri-mail-line"></i>
                Email Address
              </label>
              <input type="email" id="signupEmail" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
              <label for="signupPhone">
                <i class="ri-phone-line"></i>
                Phone Number
              </label>
              <input type="tel" id="signupPhone" placeholder="Enter your 10-digit phone number" maxlength="10" required />
            </div>

            <div class="form-group">
              <label for="signupPassword">
                <i class="ri-lock-line"></i>
                Password
              </label>
              <div class="password-input">
                <input type="password" id="signupPassword" placeholder="Create a password" required />
                <button type="button" class="password-toggle" id="passwordToggle">
                  <i class="ri-eye-line"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="signupConfirmPassword">
                <i class="ri-lock-line"></i>
                Confirm Password
              </label>
              <div class="password-input">
                <input type="password" id="signupConfirmPassword" placeholder="Re-enter your password" required />
                <button type="button" class="password-toggle" id="confirmPasswordToggle">
                  <i class="ri-eye-line"></i>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" id="agreeTerms">
                <span class="checkmark"></span>
                I agree to the Terms & Conditions
              </label>
            </div>

            <button type="submit" class="auth-btn">
              <span>Create Account</span>
              <i class="ri-user-add-line"></i>
            </button>

            <div id="signupMessage" class="auth-message"></div>
          </form>

          <div class="auth-footer">
            <p>Already have an account?</p>
            <a href="login.html" class="auth-link">
              <i class="ri-login-box-line"></i>
              Log In
            </a>
          </div>

          <div class="auth-divider">
            <span>OR</span>
          </div>

          <div class="social-auth">
            <button type="button" class="social-btn google">
              <i class="ri-google-line"></i>
              Sign up with Google
            </button>
            <button type="button" class="social-btn phone">
              <i class="ri-phone-line"></i>
              Sign up with Phone
            </button>
          </div>
        </div>
      </div>
    </section>

    <script src="signup.js"></script>
    <script src="auth-enhancements.js"></script>
    <script src="auth-ui.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP - Torque Rentals</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="auth-ui.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- Firebase Configuration -->
    <script>
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      const firebaseConfig = {
        apiKey: "AIzaSyBWuYaxiI4xEpqKY24B3j1Wc3QF-J8b1h0",
        authDomain: "tourqe-retals.firebaseapp.com",
        projectId: "tourqe-retals",
        storageBucket: "tourqe-retals.firebasestorage.app",
        messagingSenderId: "24112773418",
        appId: "1:24112773418:web:bc79f633512373b9d24653",
        measurementId: "G-7XDG1MJSQY",
      };

      // Initialize Firebase
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();

      console.log("Firebase initialized:", auth);
    </script>
  </head>
  <body>
    <header>
      <div class="nav container">
        <a href="index.html" class="logo">
          <img
            src="img/logo.png"
            width="80"
            height="40"
            alt="Torque Rentals logo"
          />
        </a>
        <!-- Sign up button - shown when not logged in -->
        <a href="signup.html" class="sign-up" id="signup-btn">Sign Up</a>
        <!-- User Profile - shown when logged in -->
        <div class="user-profile hidden" id="user-profile">
          <div class="profile-dropdown">
            <button class="profile-btn" id="profile-btn">
              <i class="ri-user-line"></i>
              <span id="user-name">User</span>
              <i class="ri-arrow-down-s-line"></i>
            </button>
            <div class="profile-menu" id="profile-menu">
              <a href="profile.html" class="profile-menu-item">
                <i class="ri-user-line"></i>
                My Profile
              </a>
              <a href="#" class="profile-menu-item" id="logout-btn">
                <i class="ri-logout-box-line"></i>
                Logout
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="auth-page">
      <div class="container auth-wrap">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-logo">
              <i class="ri-shield-check-line"></i>
            </div>
            <h1>Verify Your Phone</h1>
            <p class="auth-subtitle">
              Please verify your phone number to complete registration.
            </p>
          </div>

          <!-- Firebase Phone Verification Section -->
          <div class="auth-form" id="firebase-phone-auth">
            <div class="form-group">
              <label for="phoneNumber">
                <i class="ri-phone-line"></i>
                Phone Number
              </label>
              <input type="tel" id="phoneNumber" placeholder="+91XXXXXXXXXX" />
            </div>

            <button type="button" id="sendFirebaseOtp" class="auth-btn">
              <span>Send OTP</span>
              <i class="ri-send-plane-line"></i>
            </button>

            <!-- Visible message for the send-OTP step -->
            <p id="sendOtpMessage" class="auth-message" style="margin-top:0.6rem;"></p>

            <div id="recaptcha-container"></div>
          </div>

          <div id="otp-verification" class="auth-form hidden">
            <div class="form-group">
              <label for="firebaseOtp">
                <i class="ri-lock-line"></i>
                Enter OTP
              </label>
              <input
                type="text"
                id="firebaseOtp"
                placeholder="Enter 6-digit OTP"
                maxlength="6"
                inputmode="numeric"
              />
            </div>

            <div class="action-buttons">
              <button type="button" id="verifyFirebaseOtp" class="auth-btn">
                <span>Verify OTP</span>
                <i class="ri-check-line"></i>
              </button>
              <button
                type="button"
                id="resendFirebaseOtp"
                class="btn-secondary"
              >
                <span>Resend OTP</span>
                <i class="ri-refresh-line"></i>
              </button>
            </div>

            <!-- Message for the verify step -->
            <p id="firebaseMessage" class="auth-message" style="margin-top:0.6rem;"></p>
          </div>

          <!-- Fallback Phone Verification Section -->
          <div class="auth-form" id="fallback-section" style="display: none">
            <div class="form-group">
              <label for="phoneOtp">
                <i class="ri-lock-line"></i>
                Phone OTP
              </label>
              <input
                type="text"
                id="phoneOtp"
                placeholder="Enter 6-digit phone OTP"
                maxlength="6"
              />
            </div>

            <div class="action-buttons">
              <button type="submit" form="phoneVerifyForm" class="auth-btn">
                <span>Verify Phone</span>
                <i class="ri-check-line"></i>
              </button>
              <button type="button" id="resendPhoneOtp" class="btn-secondary">
                <span>Resend Phone OTP</span>
                <i class="ri-refresh-line"></i>
              </button>
            </div>

            <p id="phoneMessage" class="auth-message"></p>
          </div>

          <div class="verification-status">
            <p id="statusMessage" class="auth-message"></p>
            <button id="continueBtn" class="auth-btn" style="display: none">
              <span>Continue to Dashboard</span>
              <i class="ri-arrow-right-line"></i>
            </button>
          </div>

          <div class="auth-footer">
            <p>Need help?</p>
            <a href="index.html" class="auth-link">
              <i class="ri-home-line"></i>
              Skip for now
            </a>
          </div>
        </div>
      </div>
    </section>

    <script>
      // CLEAN WORKING OTP IMPLEMENTATION
      document.addEventListener("DOMContentLoaded", function () {
        console.log("🚀 OTP System Starting...");

        const auth = firebase.auth();

        // Get DOM elements
        const phoneInput = document.getElementById("phoneNumber");
        const sendBtn = document.getElementById("sendFirebaseOtp");
        const sendMessageEl = document.getElementById("sendOtpMessage");
        const otpSection = document.getElementById("otp-verification");
        const otpInput = document.getElementById("firebaseOtp");
        const verifyBtn = document.getElementById("verifyFirebaseOtp");
        const resendBtn = document.getElementById("resendFirebaseOtp");
        const verifyMessageEl = document.getElementById("firebaseMessage");
        const continueBtn = document.getElementById("continueBtn");

        let confirmationResult = null;

        function showSendMsg(text, isError) {
          sendMessageEl.textContent = text;
          sendMessageEl.style.color = isError ? "#d93025" : (isError === false ? "#188038" : "#666");
        }

        function showVerifyMsg(text, isError) {
          verifyMessageEl.textContent = text;
          verifyMessageEl.style.color = isError ? "#d93025" : (isError === false ? "#188038" : "#666");
        }

        // Initialize reCAPTCHA
        function initRecaptcha() {
          try {
            if (window.recaptchaVerifier) {
              window.recaptchaVerifier.clear();
            }
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
              "recaptcha-container",
              {
                size: "invisible",
                callback: function () {
                  console.log("✅ reCAPTCHA solved");
                },
                "expired-callback": function () {
                  console.log("⚠️ reCAPTCHA expired, reinitializing...");
                  initRecaptcha();
                }
              }
            );
            console.log("✅ reCAPTCHA initialized");
          } catch (error) {
            console.error("❌ reCAPTCHA init error:", error);
          }
        }

        initRecaptcha();

        // Send OTP
        if (sendBtn) {
          sendBtn.addEventListener("click", async function (e) {
            e.preventDefault();
            console.log("🔥 Send OTP clicked!");

            const phoneNumber = phoneInput.value.trim();

            if (!phoneNumber) {
              showSendMsg("Please enter your phone number.", true);
              return;
            }

            if (!/^\+91\d{10}$/.test(phoneNumber)) {
              showSendMsg("Enter a valid Indian number: +91XXXXXXXXXX", true);
              return;
            }

            sendBtn.disabled = true;
            showSendMsg("Sending OTP…", null);

            try {
              // Re-init reCAPTCHA if needed
              if (!window.recaptchaVerifier) initRecaptcha();

              confirmationResult = await auth.signInWithPhoneNumber(
                phoneNumber,
                window.recaptchaVerifier
              );

              showSendMsg("OTP sent! Check your messages.", false);
              console.log("✅ OTP sent to:", phoneNumber);

              // Show OTP section
              otpSection.classList.remove("hidden");
              otpSection.style.display = "block";
              sendBtn.textContent = "Resend OTP";
              sendBtn.disabled = false;

            } catch (error) {
              console.error("❌ Send OTP error:", error);
              sendBtn.disabled = false;

              // Reset reCAPTCHA on error so user can retry
              initRecaptcha();

              let msg = "Failed to send OTP.";
              if (error.code === "auth/invalid-phone-number")   msg = "Invalid phone number format.";
              else if (error.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
              else if (error.code === "auth/quota-exceeded")    msg = "SMS quota exceeded. Try later.";
              else if (error.message)                           msg = error.message;

              showSendMsg(msg, true);
            }
          });
        }

        // Verify OTP
        if (verifyBtn) {
          verifyBtn.addEventListener("click", async function (e) {
            e.preventDefault();
            console.log("🔥 Verify OTP clicked!");

            const otp = otpInput.value.trim();

            if (!otp || !/^\d{6}$/.test(otp)) {
              showVerifyMsg("Enter the 6-digit OTP.", true);
              return;
            }

            if (!confirmationResult) {
              showVerifyMsg("Please send OTP first.", true);
              return;
            }

            verifyBtn.disabled = true;
            showVerifyMsg("Verifying…", null);

            try {
              const result = await confirmationResult.confirm(otp);
              const user = result.user;

              showVerifyMsg("Phone verified successfully! ✅", false);
              console.log("✅ Phone verified:", user.phoneNumber);

              // Merge with existing user data
              const existing = JSON.parse(localStorage.getItem("currentUser") || "{}");
              localStorage.setItem("currentUser", JSON.stringify({
                ...existing,
                uid: user.uid,
                phoneNumber: user.phoneNumber,
                phoneVerified: true,
              }));

              otpSection.classList.add("hidden");
              otpSection.style.display = "none";

              if (continueBtn) continueBtn.style.display = "inline-block";

            } catch (error) {
              console.error("❌ Verify OTP error:", error);
              verifyBtn.disabled = false;

              let msg = "Verification failed.";
              if (error.code === "auth/invalid-verification-code") msg = "Wrong OTP. Please try again.";
              else if (error.code === "auth/code-expired")         msg = "OTP expired. Please resend.";
              else if (error.message)                              msg = error.message;

              showVerifyMsg(msg, true);
            }
          });
        }

        // Resend OTP — just re-click send
        if (resendBtn) {
          resendBtn.addEventListener("click", function (e) {
            e.preventDefault();
            otpInput.value = "";
            otpSection.classList.add("hidden");
            otpSection.style.display = "none";
            sendBtn.click();
          });
        }

        // Continue button
        if (continueBtn) {
          continueBtn.addEventListener("click", function () {
            window.location.href = "index.html";
          });
        }

        console.log("🎯 OTP System Ready!");
      });
    </script>
    <script src="verify-otp.js"></script>
    <script src="auth-ui.js"></script>
  </body>
</html>

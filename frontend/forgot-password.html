<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Torque Rentals</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <header>
      <div class="nav container">
        <a href="index.html" class="logo">
          <img src="img/logo.png" width="80" height="40" alt="Torque Rentals logo" />
        </a>
      </div>
    </header>

    <section class="auth-page">
      <div class="container auth-wrap">
        <form class="auth-card" id="forgotPasswordForm">
          <h1>Reset Password</h1>
          <p class="auth-subtitle">Enter your email address to receive password reset instructions.</p>

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />

          <button type="submit">Send Reset Instructions</button>
          <p id="message" class="auth-message"></p>
          <p class="auth-alt">Remember your password? <a href="login.html">Log In</a></p>
        </form>
      </div>
    </section>

    <script src="forgot-password.js"></script>
  </body>
</html>

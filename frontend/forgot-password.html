<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Torque Rentals</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="stylesheet" href="auth-ui.css" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav container">
      <a href="index.html" class="logo">
        <img src="img/logo.png" width="80" height="40" alt="Torque Rentals logo" />
      </a>
      <a href="login.html" class="sign-up">Log In</a>
    </div>
  </header>

  <section class="auth-page">
    <div class="container auth-wrap">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <i class="ri-lock-password-line"></i>
          </div>
          <h1>Forgot Password?</h1>
          <p class="auth-subtitle">Enter your email and we'll send you reset instructions.</p>
        </div>

        <form id="forgotPasswordForm" class="auth-form">
          <div class="form-group">
            <label for="email">
              <i class="ri-mail-line"></i>
              Email Address
            </label>
            <input type="email" id="email" placeholder="Enter your email" required />
          </div>

          <button type="submit" class="auth-btn">
            <span>Send Reset Instructions</span>
            <i class="ri-send-plane-line"></i>
          </button>

          <div id="message" class="auth-message"></div>
        </form>

        <div class="auth-footer">
          <p>Remember your password?</p>
          <a href="login.html" class="auth-link">
            <i class="ri-login-box-line"></i>
            Back to Log In
          </a>
        </div>
      </div>
    </div>
  </section>

  <script src="toast.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Torque Rentals</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="auth-ui.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
  </head>
  <body>
    <header>
      <div class="nav container">
        <a href="index.html" class="logo">
          <img src="img/logo.png" width="80" height="40" alt="Torque Rentals logo" />
        </a>
        <!-- Sign up button - shown when not logged in -->
        <a href="signup.html" class="sign-up" id="signup-btn">Sign Up</a>
        <!-- User Profile - shown when logged in -->
        <div class="user-profile hidden" id="user-profile">
          <div class="profile-dropdown">
            <button class="profile-btn" id="profile-btn">
              <i class="ri-user-line"></i>
              <span id="user-name">User</span>
              <i class="ri-arrow-down-s-line"></i>
            </button>
            <div class="profile-menu" id="profile-menu">
              <a href="profile.html" class="profile-menu-item">
                <i class="ri-user-line"></i>
                My Profile
              </a>
              <a href="#" class="profile-menu-item" id="logout-btn">
                <i class="ri-logout-box-line"></i>
                Logout
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="auth-page">
      <div class="container auth-wrap">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-logo">
              <i class="ri-motorbike-line"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Log in to continue booking your next ride.</p>
          </div>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label for="loginEmail">
                <i class="ri-mail-line"></i>
                Email Address
              </label>
              <input type="email" id="loginEmail" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
              <label for="loginPassword">
                <i class="ri-lock-line"></i>
                Password
              </label>
              <div class="password-input">
                <input type="password" id="loginPassword" placeholder="Enter your password" required />
                <button type="button" class="password-toggle" id="passwordToggle">
                  <i class="ri-eye-line"></i>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" id="rememberMe">
                <span class="checkmark"></span>
                Remember me
              </label>
              <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="auth-btn">
              <span>Log In</span>
              <i class="ri-arrow-right-line"></i>
            </button>

            <div id="loginMessage" class="auth-message"></div>
          </form>

          <div class="auth-footer">
            <p>Don't have an account?</p>
            <a href="signup.html" class="auth-link">
              <i class="ri-user-add-line"></i>
              Create an account
            </a>
          </div>

          <div class="auth-divider">
            <span>OR</span>
          </div>

          <div class="social-auth">
            <button type="button" class="social-btn google">
              <i class="ri-google-line"></i>
              Continue with Google
            </button>
            <button type="button" class="social-btn phone">
              <i class="ri-phone-line"></i>
              Continue with Phone
            </button>
          </div>
        </div>
      </div>
    </section>

    <script src="login.js"></script>
    <script src="auth-enhancements.js"></script>
    <script src="auth-ui.js"></script>
  </body>
</html>

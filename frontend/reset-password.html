<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Torque Rentals</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <header>
      <div class="nav container">
        <a href="index.html" class="logo">
          <img src="img/logo.png" width="80" height="40" alt="Torque Rentals logo" />
        </a>
      </div>
    </header>

    <section class="auth-page">
      <div class="container auth-wrap">
        <form class="auth-card" id="resetPasswordForm">
          <h1>Set New Password</h1>
          <p class="auth-subtitle">Create a new password for your account.</p>

          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required />

          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required />

          <button type="submit">Reset Password</button>
          <p id="message" class="auth-message"></p>
          <p class="auth-alt"><a href="login.html">Back to Login</a></p>
        </form>
      </div>
    </section>

    <script src="reset-password.js"></script>
  </body>
</html>

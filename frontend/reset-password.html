<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Torque Rentals</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="stylesheet" href="auth-ui.css" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav container">
      <a href="index.html" class="logo">
        <img src="img/logo.png" width="80" height="40" alt="Torque Rentals logo" />
      </a>
      <a href="login.html" class="sign-up">Log In</a>
    </div>
  </header>

  <section class="auth-page">
    <div class="container auth-wrap">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <i class="ri-shield-keyhole-line"></i>
          </div>
          <h1>Set New Password</h1>
          <p class="auth-subtitle">Create a strong new password for your account.</p>
        </div>

        <form id="resetPasswordForm" class="auth-form">
          <div class="form-group">
            <label for="newPassword">
              <i class="ri-lock-line"></i>
              New Password
            </label>
            <div class="password-input">
              <input type="password" id="newPassword" placeholder="Enter new password" required />
              <button type="button" class="password-toggle" id="newPasswordToggle">
                <i class="ri-eye-line"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">
              <i class="ri-lock-line"></i>
              Confirm Password
            </label>
            <div class="password-input">
              <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
              <button type="button" class="password-toggle" id="confirmPasswordToggle">
                <i class="ri-eye-line"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn">
            <span>Reset Password</span>
            <i class="ri-check-line"></i>
          </button>

          <div id="message" class="auth-message"></div>
        </form>

        <div class="auth-footer">
          <p>Remembered it?</p>
          <a href="login.html" class="auth-link">
            <i class="ri-login-box-line"></i>
            Back to Log In
          </a>
        </div>
      </div>
    </div>
  </section>

  <script src="toast.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>

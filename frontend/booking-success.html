<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed | Torque Rentals</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth-ui.css" />
  <link rel="stylesheet" href="booking-success.css" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="nav container">
      <a href="index.html" class="logo">
        <img src="img/logo.png" width="80" height="40" alt="Torque Rentals" />
      </a>
    </div>
  </header>

  <main class="success-page">
    <div class="container success-wrap">
      <div class="success-card">

        <!-- Animated checkmark -->
        <div class="success-icon-wrap">
          <div class="success-circle">
            <i class="ri-check-line"></i>
          </div>
        </div>

        <h1>Booking Confirmed!</h1>
        <p class="success-subtitle">Your ride is all set. Here's your booking summary.</p>

        <!-- Booking details -->
        <div class="success-summary" id="successSummary">
          <div class="summary-row">
            <span class="summary-label"><i class="ri-motorbike-line"></i> Bike</span>
            <span class="summary-value" id="sBikeName">—</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><i class="ri-user-line"></i> Name</span>
            <span class="summary-value" id="sCustomerName">—</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><i class="ri-mail-line"></i> Email</span>
            <span class="summary-value" id="sEmail">—</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><i class="ri-calendar-line"></i> Pickup</span>
            <span class="summary-value" id="sPickup">—</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><i class="ri-calendar-check-line"></i> Drop</span>
            <span class="summary-value" id="sDrop">—</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><i class="ri-time-line"></i> Duration</span>
            <span class="summary-value" id="sHours">—</span>
          </div>
          <div class="summary-row summary-total">
            <span class="summary-label"><i class="ri-money-rupee-circle-line"></i> Total Paid</span>
            <span class="summary-value" id="sTotal">—</span>
          </div>
        </div>

        <!-- Actions -->
        <div class="success-actions">
          <button class="success-btn-print" onclick="window.print()">
            <i class="ri-printer-line"></i> Print Receipt
          </button>
          <a href="my-bookings.html" class="success-btn-primary">
            <i class="ri-calendar-check-line"></i> My Bookings
          </a>
          <a href="index.html#bikes" class="success-btn-secondary">
            <i class="ri-add-line"></i> Book Another
          </a>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <img src="img/logo.png" alt="Torque Rentals" height="36" />
        <p>Ride free. Ride smart.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="index.html#bikes">Bikes</a>
        <a href="dealers.html">Dealers</a>
        <a href="profile.html">Profile</a>
      </div>
      <p class="footer-copy">&copy; 2026 Torque Rentals. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function fmt(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Try both storage keys used by booking.js
      const booking = JSON.parse(
        localStorage.getItem('currentBooking') ||
        localStorage.getItem('booking') ||
        'null'
      );

      if (!booking) {
        document.getElementById('successSummary').innerHTML =
          '<p style="color:var(--text-alter-color);text-align:center">No booking data found.</p>';
        return;
      }

      document.getElementById('sBikeName').textContent     = booking.bikeName || booking.bike_name || '—';
      document.getElementById('sCustomerName').textContent = booking.customerName || booking.customer_name || '—';
      document.getElementById('sEmail').textContent        = booking.customerEmail || booking.customer_email || '—';
      document.getElementById('sPickup').textContent       = fmt(booking.startDate || booking.start_date);
      document.getElementById('sDrop').textContent         = fmt(booking.endDate   || booking.end_date);
      const hrs = booking.totalHours || booking.total_hours || '—';
      document.getElementById('sHours').textContent        = hrs + (hrs !== '—' ? ' hr' + (hrs > 1 ? 's' : '') : '');
      const amt = booking.totalPrice || booking.total_amount || booking.total_price || 0;
      document.getElementById('sTotal').textContent        = '₹' + Number(amt).toLocaleString('en-IN');

      // Clean up temp storage
      localStorage.removeItem('booking');
    });
  </script>
  <script src="auth-ui.js"></script>
</body>
</html>

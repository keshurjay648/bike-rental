<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Torque Rentals</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="nav container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" width="80px" height="40px" alt="Torque Rentals">
            </a>
            <div class="navbar">
                <a href="index.html" class="nav-link">Home</a>
                <a href="#bikes" class="nav-link">Bikes</a>
                <a href="#destination" class="nav-link">Destination</a>
                <a href="#reviews" class="nav-link">Reviews</a>
            </div>
            <div class="user-profile" id="user-profile">
                <div class="profile-dropdown">
                    <button class="profile-btn" id="profile-btn">
                        <i class="ri-user-line"></i>
                        <span id="user-name">User</span>
                        <i class="ri-arrow-down-s-line"></i>
                    </button>
                    <div class="profile-menu" id="profile-menu">
                        <a href="profile.html" class="profile-menu-item">
                            <i class="ri-user-line"></i>
                            My Profile
                        </a>
                        <a href="#" class="profile-menu-item" id="logout-btn">
                            <i class="ri-logout-box-line"></i>
                            Logout
                        </a>
                    </div>
                </div>
            </div>
            <div class="menu-icon">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="ri-user-line"></i>
            </div>
            <h1 class="profile-name" id="profile-name">Loading...</h1>
            <div class="profile-status" id="profile-status">
                <i class="ri-checkbox-circle-line"></i>
                Active User
            </div>
        </div>

        <div class="profile-sections">
            <!-- Personal Information -->
            <div class="profile-section">
                <h2 class="section-title">
                    <i class="ri-user-line"></i>
                    Personal Information
                </h2>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">
                            <i class="ri-user-line"></i>
                            Full Name
                        </div>
                        <div class="info-value" id="user-full-name">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <i class="ri-mail-line"></i>
                            Email Address
                        </div>
                        <div class="info-value" id="user-email">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <i class="ri-phone-line"></i>
                            Phone Number
                        </div>
                        <div class="info-value">
                            <span id="user-phone">Loading...</span>
                            <span class="verified-badge" id="phone-verified-badge" style="display: none;">
                                <i class="ri-checkbox-circle-line"></i>
                                Verified
                            </span>
                            <span class="unverified-badge" id="phone-unverified-badge" style="display: none;">
                                <i class="ri-error-warning-line"></i>
                                Not Verified
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Account Information -->
            <div class="profile-section">
                <h2 class="section-title">
                    <i class="ri-settings-line"></i>
                    Account Information
                </h2>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">
                            <i class="ri-calendar-line"></i>
                            Member Since
                        </div>
                        <div class="info-value" id="member-since">Loading...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <i class="ri-shield-check-line"></i>
                            Account Status
                        </div>
                        <div class="info-value">
                            <span class="verified-badge">
                                <i class="ri-checkbox-circle-line"></i>
                                Active
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="profile-section">
                <h2 class="section-title">
                    <i class="ri-flashlight-line"></i>
                    Quick Actions
                </h2>
                <div class="action-buttons">
                    <a href="index.html" class="btn btn-primary">
                        <i class="ri-motorbike-line"></i>
                        Book a Bike
                    </a>
                    <a href="verify-otp.html" class="btn btn-secondary" id="verify-phone-btn">
                        <i class="ri-shield-check-line"></i>
                        Verify Phone
                    </a>
                    <button class="btn btn-danger" id="delete-account-btn">
                        <i class="ri-delete-bin-line"></i>
                        Delete Account
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="auth-ui.js"></script>
    <script src="profile.js"></script>
</body>
</html>
